name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Unit & integration tests ──────────────────────────────────
  test:
    name: Test (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: macos
            os: macos-latest
          - name: windows
            os: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Run tests
        working-directory: search
        run: cargo test

  # ── Comprehensive smoke tests (all query features) ────────────
  smoke:
    name: Smoke (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
          - name: macos
            os: macos-latest
          - name: windows
            os: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Build release binary
        working-directory: search
        run: cargo build --release

      - name: Setup env (bash)
        if: matrix.os != 'windows-latest'
        run: |
          echo "PAPERS_DIR=$PWD/PAPERS" >> "$GITHUB_ENV"
          echo "PAPERS_DB_PATH=$PWD/papers.db" >> "$GITHUB_ENV"
          echo "$PWD/search/target/release" >> "$GITHUB_PATH"

      - name: Setup env (pwsh)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          "PAPERS_DIR=$pwd\PAPERS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PAPERS_DB_PATH=$pwd\papers.db" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "$pwd\search\target\release" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build database
        run: search build-db

      # ── Basic query filters ──
      - name: Query — keyword
        run: |
          OUT=$(search query --conference EMNLP --year 2020 "attention is all you need for {C}hinese")
          echo "$OUT" | grep "Word Segmentation"

      - name: Query — level
        run: |
          OUT=$(search query --level B --conference EMNLP --year 2020 "attention")
          echo "$OUT" | grep -q "^B"

      - name: Query — conference
        run: |
          OUT=$(search query --conference ICML --year 2024 diffusion)
          echo "$OUT" | grep -i "icml"

      - name: Query — year
        run: |
          OUT=$(search query --conference NeurIPS --year 2023)
          echo "$OUT" | grep "2023"

      - name: Query — combined filters
        run: |
          OUT=$(search query --level A --conference ICML --year 2024 diffusion)
          echo "$OUT" | grep -qi "icml"
          echo "$OUT" | grep -q "2024"

      # ── Exclude filters ──
      - name: Query — exclude keyword
        run: |
          OUT=$(search query --conference ICML --year 2024 --exclude diffusion)
          ! echo "$OUT" | grep -i "diffusion"

      - name: Query — exclude level
        run: |
          OUT=$(search query --conference EMNLP --year 2020 "attention" --exclude-level A --columns level)
          echo "$OUT" | grep -q "^B$"
          ! echo "$OUT" | grep -q "^A$"

      - name: Query — exclude conference
        run: |
          OUT=$(search query --level A --year 2024 --exclude-conference ICML --conference ICML,NeurIPS diffusion)
          echo "$OUT" | grep -vqi "icml"
          echo "$OUT" | grep -qi "neurips"

      - name: Query — exclude year
        run: |
          OUT=$(search query --conference ICML --year 2024,2025 --exclude-year 2025 diffusion)
          echo "$OUT" | grep -q "2024"
          echo "$OUT" | grep -vq "2025" || true

      # ── Sorting ──
      - name: Query — sort ascending
        run: |
          OUT=$(search query --conference ICML --year 2024 --sort year:asc diffusion)
          echo "$OUT" | grep "2024"

      - name: Query — sort descending
        run: |
          OUT=$(search query --conference ICML --year 2023,2024 --sort year:desc diffusion)
          FIRST=$(printf '%s\n' "$OUT" | sed -n '1p')
          echo "$FIRST" | grep -q "2024"

      - name: Query — sort multi-field
        run: |
          OUT=$(search query --sort level:asc --sort conference:asc --sort year:desc --conference ICML,NeurIPS --year 2024 diffusion)
          test -n "$OUT"

      # ── Column selection ──
      - name: Query — columns include
        run: |
          OUT=$(search query --conference ICML --year 2024 --columns conference,year,title diffusion)
          echo "$OUT" | grep -i "icml"
          echo "$OUT" | grep -q "2024"

      - name: Query — columns exclude
        run: |
          OUT=$(search query --conference ICML --year 2024 --exclude-columns bib,author,url diffusion)
          test -n "$OUT"

      - name: Query — columns with bib field
        run: |
          OUT=$(search query --conference ICML --year 2024 --columns conference,year,title,bib diffusion)
          test -n "$OUT"

      # ── BibTeX ──
      - name: Bib — default output
        run: |
          OUT=$(search bib --conference EMNLP --year 2020 "attention")
          echo "$OUT" | grep -i "@inproceedings"

      - name: Bib — custom columns
        run: |
          OUT=$(search bib --conference ICML --year 2024 --columns title,bib diffusion)
          echo "$OUT" | grep -i "diffusion"

      - name: Bib — exclude columns
        run: |
          OUT=$(search bib --conference ICML --year 2024 --exclude-columns url,author diffusion)
          test -n "$OUT"

      # ── Positional keywords ──
      - name: Query — positional keywords
        run: |
          OUT=$(search query --conference ICML --year 2024 diffusion model)
          echo "$OUT" | grep -i "diffusion"

      # ── Comma-separated values ──
      - name: Query — comma separated conferences
        run: |
          OUT=$(search query --conference ICML,NeurIPS --year 2024 diffusion)
          echo "$OUT" | grep -i "icml\|neurips"

      - name: Query — comma separated years
        run: |
          OUT=$(search query --conference ICML --year 2023,2024,2025 diffusion)
          test -n "$OUT"

      # ── Error handling ──
      - name: Error — no filter
        run: |
          OUT=$(search query 2>&1 || true)
          echo "$OUT" | grep -i "filter\|help"

      - name: Error — columns/exclude-columns conflict
        run: |
          OUT=$(search query --conference ICML --year 2024 --columns title --exclude-columns bib diffusion 2>&1 || true)
          echo "$OUT" | grep -i "cannot"

      - name: Error — unknown column
        run: |
          OUT=$(search query --conference ICML --year 2024 --columns nonexistent diffusion 2>&1 || true)
          echo "$OUT" | grep -i "unknown"

      - name: Error — missing PAPERS dir
        run: |
          OUT=$(PAPERS_DIR=/nonexistent search build-db 2>&1 || true)
          echo "$OUT" | grep -i "not found"

      # ── Multiple keyword AND logic ──
      - name: Query — multi-keyword AND
        run: |
          OUT=$(search query --conference ICML --year 2024 diffusion model)
          echo "$OUT" | grep -i "diffusion"

      # ── Case insensitivity ──
      - name: Query — case insensitive conference
        run: |
          OUT=$(search query --conference icml --year 2024 diffusion)
          echo "$OUT" | grep -i "icml"

      - name: Query — case insensitive keyword
        run: |
          OUT=$(search query --conference ICML --year 2024 DIFFUSION)
          echo "$OUT" | grep -i "diffusion"

  # ── install.sh verification ───────────────────────────────────
  install-sh:
    name: Verify install.sh
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Run install.sh
        run: |
          git branch topaperlist-ci-update HEAD
          TOPAPERLIST_REPO_URL="$PWD" \
          TOPAPERLIST_UPDATE_BRANCH=topaperlist-ci-update \
          INSTALL_ROOT="${{ runner.temp }}/topaperlist" \
          BIN_DIR="${{ runner.temp }}/bin" \
          ./install.sh

      - name: Smoke — keyword query
        run: |
          export PATH="${{ runner.temp }}/bin:$PATH"
          search query --conference EMNLP --year 2020 "attention is all you need for {C}hinese"

      - name: Smoke — bib export
        run: |
          export PATH="${{ runner.temp }}/bin:$PATH"
          search bib --conference EMNLP --year 2020 "attention"

      - name: Smoke — column selection
        run: |
          export PATH="${{ runner.temp }}/bin:$PATH"
          search query --conference EMNLP --year 2020 --columns conference,year,title "attention"

      - name: Smoke — exclude columns
        run: |
          export PATH="${{ runner.temp }}/bin:$PATH"
          search query --conference EMNLP --year 2020 --exclude-columns bib,url "attention"

      - name: Smoke — sort
        run: |
          export PATH="${{ runner.temp }}/bin:$PATH"
          OUT=$(search query --sort year:desc --conference ICML --year 2023,2024 diffusion)
          FIRST=$(printf '%s\n' "$OUT" | sed -n '1p')
          echo "$FIRST" | grep "2024"

      - name: Smoke — exclude filters
        run: |
          export PATH="${{ runner.temp }}/bin:$PATH"
          search query --conference ICML --year 2023,2024 --exclude-year 2023 diffusion | grep -v "2023"

      - name: Smoke - version and update wrapper
        run: |
          export PATH="${{ runner.temp }}/bin:$PATH"
          OUT=$(search version)
          echo "$OUT" | grep "topaperlist"
          search update

      - name: Smoke - skip this data version
        run: |
          printf 'old-version' > "${{ runner.temp }}/topaperlist/db.version"
          sh "${{ runner.temp }}/topaperlist/check-update.sh" \
            --install-root "${{ runner.temp }}/topaperlist" \
            --repo-url "$PWD" \
            --branch topaperlist-ci-update \
            --binary "${{ runner.temp }}/topaperlist/search" \
            --skip-this-version \
            --quiet
          test "$(cat "${{ runner.temp }}/topaperlist/skipped.version")" = "$(git rev-parse topaperlist-ci-update)"

      - name: Idempotent re-install
        run: |
          TOPAPERLIST_REPO_URL="$PWD" \
          TOPAPERLIST_UPDATE_BRANCH=topaperlist-ci-update \
          INSTALL_ROOT="${{ runner.temp }}/topaperlist" \
          BIN_DIR="${{ runner.temp }}/bin" \
          ./install.sh

  # ── install.ps1 verification ──────────────────────────────────
  install-ps1:
    name: Verify install.ps1
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup default stable

      - name: Run install.ps1
        shell: pwsh
        run: |
          $env:InstallRoot = "$env:RUNNER_TEMP\topaperlist"
          git branch topaperlist-ci-update HEAD
          .\install.ps1 -InstallRoot $env:InstallRoot -NoPath -RepoUrl $pwd -UpdateBranch topaperlist-ci-update

      - name: Smoke — keyword query
        shell: pwsh
        run: |
          $cmd = "$env:RUNNER_TEMP\topaperlist\search.cmd"
          & $cmd query --conference EMNLP --year 2020 "attention is all you need for {C}hinese"

      - name: Smoke — bib export
        shell: pwsh
        run: |
          $cmd = "$env:RUNNER_TEMP\topaperlist\search.cmd"
          & $cmd bib --conference EMNLP --year 2020 "attention"

      - name: Smoke — column selection
        shell: pwsh
        run: |
          $cmd = "$env:RUNNER_TEMP\topaperlist\search.cmd"
          & $cmd query --conference EMNLP --year 2020 --columns conference,year,title "attention"

      - name: Smoke — exclude columns
        shell: pwsh
        run: |
          $cmd = "$env:RUNNER_TEMP\topaperlist\search.cmd"
          & $cmd query --conference EMNLP --year 2020 --exclude-columns bib,url "attention"

      - name: Smoke — sort
        shell: pwsh
        run: |
          $cmd = "$env:RUNNER_TEMP\topaperlist\search.cmd"
          $out = & $cmd query --sort year:desc --conference ICML --year 2023,2024 diffusion
          ($out -split "`n")[0] | Should -BeLike "*2024*"

      - name: Smoke — exclude filters
        shell: pwsh
        run: |
          $cmd = "$env:RUNNER_TEMP\topaperlist\search.cmd"
          $out = & $cmd query --conference ICML --year 2023,2024 --exclude-year 2023 diffusion
          $out | Should -Not -BeLike "*2023*"

      - name: Smoke - version and update wrapper
        shell: pwsh
        run: |
          $cmd = "$env:RUNNER_TEMP\topaperlist\search.cmd"
          & $cmd version | Should -Contain "topaperlist 1.0.0-dev"
          & $cmd update

      - name: Smoke - skip this data version
        shell: pwsh
        run: |
          $root = "$env:RUNNER_TEMP\topaperlist"
          Set-Content -LiteralPath "$root\db.version" -Value "old-version" -NoNewline
          & "$root\check-update.ps1" -InstallRoot $root -RepoUrl $pwd -Branch topaperlist-ci-update -Binary "$root\search-bin.exe" -SkipThisVersion -Quiet
          $expected = git rev-parse topaperlist-ci-update
          Get-Content -LiteralPath "$root\skipped.version" -Raw | Should -Be $expected

      - name: Idempotent re-install
        shell: pwsh
        run: |
          $env:InstallRoot = "$env:RUNNER_TEMP\topaperlist"
          .\install.ps1 -InstallRoot $env:InstallRoot -NoPath -RepoUrl $pwd -UpdateBranch topaperlist-ci-update
